version: "3.3"

services:
  frontend-canary:
    image: docker.1ms.run/library/nginx:1.21-alpine
    container_name: oj-frontend-canary
    ports:
      - "8081:80"
    volumes:
      - ./dist:/usr/share/nginx/html:ro
      - ./nginx.canary.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    networks:
      - onlinejudgedeploy_default

networks:
  onlinejudgedeploy_default:
    external: true